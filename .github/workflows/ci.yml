name: CI

# Runs on every push to main and on every pull request.
# Fails the check if the app no longer builds, so broken code
# doesn't get deployed to Railway.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (frontend + server bundle)
        run: npm run build
        # Note: the build only bundles the server, it does not run it,
        # so no JWT_SECRET or DATABASE_URL is needed at this stage.
